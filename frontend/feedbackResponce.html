<!doctype html>
<html class="no-js" lang="de">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Internes Feedback</title>
  <link rel="stylesheet" href="css/style.css">
  <meta name="description" content="Anonymes internes Feedback-Formular">

  <meta property="og:title" content="">
  <meta property="og:type" content="">
  <meta property="og:url" content="">
  <meta property="og:image" content="">
  <meta property="og:image:alt" content="">

  <link rel="icon" href="/feedback.svg" type="image/svg+xml">

  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#151515">

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    let tailwind;
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            base:    '#151515',
            surface: '#1e1e1e',
            card:    '#242424',
            border:  '#2e2e2e',
            red:     '#E52620',
            orange:  '#FF6B00',
          },
          fontFamily: {
            display: ['Syne', 'sans-serif'],
            body:    ['DM Sans', 'sans-serif'],
          }
        }
      }
    }
  </script>
</head>

<body class="min-h-screen py-12 px-4">

<div class="max-w-2xl mx-auto">

  <div class="fade-up mb-10">
    <div class="accent-bar w-16 mb-6"></div>
    <h1 style="font-family:'Bodoni MT',sans-serif; font-weight:800;" class="text-4xl text-white tracking-tight leading-tight mb-2">
      Feedback
    </h1>
    <p class="text-sm" style="color:#666;">Feedback lesen</p>
  </div>

  <form onsubmit="handleSubmit(event)">

    <div class="fade-up delay-1 mb-6" style="background:#1e1e1e; border:1px solid #2e2e2e; border-radius:14px; padding:24px;">
      <p style="font-family:'Syne',sans-serif; font-weight:700; letter-spacing:0.1em; color:#888;" class="text-xs uppercase mb-4">Absender</p>

      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-xs mb-2" style="color:#666;">Mitarbeiter</label>
          <select class="fancy-input">
            <option value="">Maximilian Läpple</option>
          </select>
        </div>
      </div>
    </div>

    <div class="fade-up delay-2 mb-6">
      <p style="font-family:'Syne',sans-serif; font-weight:700; letter-spacing:0.1em; color:#888;" class="text-xs uppercase mb-4">Bewertung</p>
      <div class="flex flex-col gap-3">

        <div class="cat-card">
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
              <div class="num-badge">01</div>
              <span class="text-white text-sm font-medium">Kommunikation</span>
            </div>
            <div class="stars">
              <input type="radio" name="kommunikation" id="k5" value="5"/><label for="k5">★</label>
              <input type="radio" name="kommunikation" id="k4" value="4"/><label for="k4">★</label>
              <input type="radio" name="kommunikation" id="k3" value="3"/><label for="k3">★</label>
              <input type="radio" name="kommunikation" id="k2" value="2"/><label for="k2">★</label>
              <input type="radio" name="kommunikation" id="k1" value="1"/><label for="k1">★</label>
            </div>
          </div>
        </div>

        <div class="cat-card">
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
              <div class="num-badge">02</div>
              <span class="text-white text-sm font-medium">Hilfsbereitschaft</span>
            </div>
            <div class="stars">
              <input type="radio" name="hilfsbereitschaft" id="h5" value="5"/><label for="h5">★</label>
              <input type="radio" name="hilfsbereitschaft" id="h4" value="4"/><label for="h4">★</label>
              <input type="radio" name="hilfsbereitschaft" id="h3" value="3"/><label for="h3">★</label>
              <input type="radio" name="hilfsbereitschaft" id="h2" value="2"/><label for="h2">★</label>
              <input type="radio" name="hilfsbereitschaft" id="h1" value="1"/><label for="h1">★</label>
            </div>
          </div>
        </div>

        <div class="cat-card">
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
              <div class="num-badge">03</div>
              <span class="text-white text-sm font-medium">Respektvoller Umgang</span>
            </div>
            <div class="stars">
              <input type="radio" name="respekt" id="r5" value="5"/><label for="r5">★</label>
              <input type="radio" name="respekt" id="r4" value="4"/><label for="r4">★</label>
              <input type="radio" name="respekt" id="r3" value="3"/><label for="r3">★</label>
              <input type="radio" name="respekt" id="r2" value="2"/><label for="r2">★</label>
              <input type="radio" name="respekt" id="r1" value="1"/><label for="r1">★</label>
            </div>
          </div>
        </div>

      </div>
    </div>

    <div class="fade-up delay-3 mb-6" style="background:#1e1e1e; border:1px solid #2e2e2e; border-radius:14px; padding:24px;">
      <p style="font-family:'Syne',sans-serif; font-weight:700; letter-spacing:0.1em; color:#888;" class="text-xs uppercase mb-5">Freitext</p>

      <div class="mb-4">
        <div class="flex items-center gap-2 mb-2">
          <span style="width:8px;height:8px;border-radius:50%;background:#FF6B00;display:inline-block;"></span>
          <label class="text-white text-sm font-medium">Anmerkung</label>
          <span class="text-xs ml-auto" style="color:#555;">optional</span>
        </div>
        <label>
          <textarea class="fancy-input" rows="5" placeholder="Beschreibe konkrete Stärken oder positives Verhalten…"></textarea>
        </label>
      </div>

      <hr class="divider my-4"/>

    <div class="fade-up delay-4 flex flex-col items-center gap-4 pt-2 pb-8">
      <button type="submit" class="btn-submit w-full">
        Feedback absenden →
      </button>
      <p class="text-xs text-center" style="color:#444;">
        test
      </p>
    </div>
    </div>

  </form>
</div>

<a href="index.html" class="btn-fab-home">
  <img src="home.svg" alt="Icon" width="24" height="24">
</a>

<script src="js/app.js"></script>
</body>

</html>
