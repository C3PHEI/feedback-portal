<!doctype html>
<html class="no-js" lang="de">

<head>
  <script src="https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js"></script>
  <script src="js/auth.js"></script>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Feedback Hub — Inbox</title>
  <meta name="description" content="Internes Feedback">

  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#151515">

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            base:    'var(--color-base)',
            surface: 'var(--color-surface)',
            card:    'var(--color-card)',
            border:  'var(--color-border)',
            red:     'var(--color-red)',
            orange:  'var(--color-orange)',
          },
          fontFamily: {
            display: ['Bodoni MT', 'sans-serif'],
            body:    ['DM Sans', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <!-- Zentrale Farb-Konfiguration (immer zuerst laden) -->
  <link rel="stylesheet" href="css/colors.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="min-h-screen pt-24 pb-12 px-4" style="background: var(--color-base);">

<!-- Navbar -->
<div id="navbar-container"></div>

<div class="max-w-3xl mx-auto">

  <!-- Header -->
  <div class="fade-up mb-8">
    <div class="flex items-end justify-between">
      <h1 style="font-family:'Bodoni MT',sans-serif; font-weight:800;" class="text-4xl text-white tracking-tight leading-tight" data-i18n="inbox.title">
        Inbox
      </h1>
    </div>
    <p class="text-sm mt-2" style="color: var(--color-text-dim);" data-i18n="inbox.subtitle">Feedback das du erhalten hast</p>
  </div>

  <!-- Averages -->
  <div class="fade-up delay-1 mb-6" id="averages-container" style="background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: 20px;"></div>

  <!-- Feedback Cards -->
  <div class="fade-up delay-2 flex flex-col gap-3 mb-24" id="inbox-cards-container"></div>

</div>

<script src="js/i18n.js"></script>
<script src="js/data.js"></script>
<script src="js/api.js"></script>
<script src="js/render.js"></script>
<script src="js/pages/inbox.js"></script>
</body>
</html>
