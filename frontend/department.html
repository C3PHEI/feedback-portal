<!doctype html>
<html class="no-js" lang="de">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Feedback Hub — Abteilung</title>
  <meta name="description" content="Team-Feedback-Verlauf für Abteilungsleiter">

  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#151515">

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            base:    'var(--color-base)',
            surface: 'var(--color-surface)',
            card:    'var(--color-card)',
            border:  'var(--color-border)',
            red:     'var(--color-red)',
            orange:  'var(--color-orange)',
          },
          fontFamily: {
            display: ['Bodoni MT', 'sans-serif'],
            body:    ['DM Sans', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="css/colors.css">
  <link rel="stylesheet" href="css/department.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/admin.css">
</head>

<body class="min-h-screen pt-24 pb-12 px-4" style="background: var(--color-base);">

<!-- Navbar -->
<div id="navbar-container"></div>

<div class="max-w-4xl mx-auto">

  <!-- Header -->
  <div class="fade-up mb-8">
    <div class="flex items-end justify-between flex-wrap gap-4">
      <div>
        <h1 style="font-family:'Bodoni MT',sans-serif; font-weight:800;" class="text-4xl text-white tracking-tight leading-tight" data-i18n="dept.title">
          Abteilung
        </h1>
        <p class="text-sm mt-2" style="color: var(--color-text-dim);" id="dept-subtitle" data-i18n="dept.subtitle">Team-Feedback-Verlauf</p>
      </div>
      <span class="role-badge manager mb-1" data-i18n="Department Manager">Abteilungsleiter</span>
    </div>
  </div>

  <!-- Disclaimer Banner -->
  <div class="fade-up delay-1 dept-disclaimer mb-6">
    <div class="dept-disclaimer-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
    </div>
    <p class="dept-disclaimer-text" data-i18n="dept.disclaimer">
      Durchschnittswerte sind ein Orientierungswert und kein abschliessendes Urteil.
      Individuelle Feedbacks sind aus Datenschutzgründen (DSG / DSGVO) nicht einsehbar.
    </p>
  </div>

  <!-- Team Members Grid -->
  <div class="fade-up delay-2" id="dept-members-container"></div>

</div>

<div id="toast"></div>

<!-- Member Detail Drawer -->
<div class="dept-drawer-overlay" id="deptDrawerOverlay"></div>
<div class="dept-drawer" id="deptDrawer">
  <div class="dept-drawer-header">
    <div class="flex items-center gap-3">
      <div class="avatar" id="drawer-avatar" style="width:44px;height:44px;font-size:14px;border-radius:11px;"></div>
      <div>
        <div class="dept-drawer-name" id="drawer-name"></div>
        <div class="dept-drawer-role" id="drawer-role"></div>
      </div>
    </div>
    <button class="dept-drawer-close" id="deptDrawerClose" type="button" aria-label="Schliessen">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <!-- Drawer Summary Stats -->
  <div class="dept-drawer-stats" id="drawer-stats"></div>

  <!-- Low-review warning (shown conditionally) -->
  <div class="dept-low-warning" id="drawer-low-warning" style="display:none;"></div>

  <!-- Driver Averages -->
  <div class="dept-section-label" data-i18n="dept.avg_per_driver">Durchschnitt pro Driver</div>
  <div class="dept-driver-averages" id="drawer-drivers"></div>

  <!-- Feedback History List -->
  <div class="dept-section-label" style="margin-top:24px;" data-i18n="dept.section_history">Feedback-Verlauf</div>
  <div id="drawer-history"></div>
</div>

<script src="js/i18n.js"></script>
<script src="js/data.js"></script>
<script src="js/api.js"></script>
<script src="js/render.js"></script>
<script src="js/pages/department.js"></script>
</body>
</html>
